<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода - Быстро</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            background: #f0f0f0;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: #f0f0f0;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .tab-content {
            display: none;
            padding: 25px;
        }
        .tab-content.active { display: block; }
        .search-section { padding: 25px 25px 0 25px; }
        .search-box {
            position: relative;
            margin-bottom: 10px;
        }
        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
        }
        .search-box input:focus { border-color: #667eea; }
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .suggestions.show { display: block; }
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestion-item:hover { background: #f0f0f0; }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
        }
        .location-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .weather-icon { text-align: center; font-size: 64px; margin: 10px 0; }
        .temperature { text-align: center; font-size: 64px; font-weight: bold; color: #667eea; }
        .city-name { text-align: center; font-size: 24px; font-weight: bold; color: #333; margin: 10px 0; }
        .description { text-align: center; color: #666; margin-bottom: 20px; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
        }
        .info-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 18px; font-weight: bold; color: #333; }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.5s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            display: none;
            margin: 15px 25px;
        }
        .error.show { display: block; }
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('current')">🌤 Сейчас</button>
            <button class="tab-btn" onclick="switchTab('details')">📊 Детали</button>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="🔍 Введите город..." autocomplete="off">
                <div class="suggestions" id="suggestions"></div>
            </div>
            <div class="button-group">
                <button onclick="getWeather()">🌍 Найти</button>
                <button class="location-btn" onclick="getLocationWeather()">📍 Моё местоположение</button>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Загрузка...</p>
        </div>
        
        <div id="error" class="error">❌ Ошибка</div>
        
        <div id="tab-current" class="tab-content active">
            <div>
                <div class="weather-icon" id="weatherIcon">🌍</div>
                <div class="temperature" id="temperature">--°C</div>
                <div class="city-name" id="cityName">--</div>
                <div class="description" id="description">---</div>
                <div class="info-grid">
                    <div class="info-card"><div class="info-label">🤔 Ощущается как</div><div class="info-value" id="feelsLike">--°C</div></div>
                    <div class="info-card"><div class="info-label">💧 Влажность</div><div class="info-value" id="humidity">--%</div></div>
                    <div class="info-card"><div class="info-label">💨 Ветер</div><div class="info-value" id="wind">-- м/с</div></div>
                    <div class="info-card"><div class="info-label">🕐 Обновлено</div><div class="info-value" id="updateTime">--:--</div></div>
                </div>
            </div>
        </div>
        
        <div id="tab-details" class="tab-content">
            <div class="info-grid">
                <div class="info-card"><div class="info-label">🌡 Давление</div><div class="info-value" id="pressure">-- мм</div></div>
                <div class="info-card"><div class="info-label">👁 Видимость</div><div class="info-value" id="visibility">-- км</div></div>
                <div class="info-card"><div class="info-label">🌅 Восход</div><div class="info-value" id="sunrise">--:--</div></div>
                <div class="info-card"><div class="info-label">🌇 Закат</div><div class="info-value" id="sunset">--:--</div></div>
                <div class="info-card"><div class="info-label">☁️ Облачность</div><div class="info-value" id="clouds">--%</div></div>
                <div class="info-card"><div class="info-label">💨 Порывы</div><div class="info-value" id="windGust">-- м/с</div></div>
            </div>
            <div style="margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 15px;">
                <div style="font-weight: bold; margin-bottom: 10px;">💡 Совет</div>
                <div id="weatherTip">Выберите город</div>
            </div>
        </div>
        
        <div class="footer">⚡ Быстрая погода</div>
    </div>

    <script>
        let currentWeather = null;
        
        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Введите город');
                return;
            }
            
            showLoading(true);
            hideError();
            
            try {
                // Шаг 1: получаем координаты города
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=ru`;
                const geoResp = await fetch(geoUrl);
                const geoData = await geoResp.json();
                
                if (!geoData.results || geoData.results.length === 0) {
                    showError('Город не найден');
                    showLoading(false);
                    return;
                }
                
                const location = geoData.results[0];
                const cityName = `${location.name}, ${location.country}`;
                
                // Шаг 2: получаем погоду по координатам
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${location.latitude}&longitude=${location.longitude}&current_weather=true&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,pressure_msl,visibility,cloudcover&daily=sunrise,sunset&timezone=auto`;
                const weatherResp = await fetch(weatherUrl);
                const weatherData = await weatherResp.json();
                
                const current = weatherData.current_weather;
                const hour = weatherData.hourly;
                const daily = weatherData.daily;
                
                const temp = Math.round(current.temperature);
                const feelsLike = Math.round(hour.apparent_temperature[0]);
                const humidity = hour.relative_humidity_2d[0];
                const windSpeed = current.windspeed;
                const pressure = Math.round(hour.pressure_msl[0] * 0.750062);
                const visibility = Math.round(hour.visibility[0] / 1000);
                const clouds = hour.cloudcover[0];
                const weatherCode = current.weathercode;
                
                let sunrise = '--:--';
                let sunset = '--:--';
                if (daily && daily.sunrise && daily.sunrise[0]) {
                    sunrise = new Date(daily.sunrise[0]).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    sunset = new Date(daily.sunset[0]).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                }
                
                let emoji = '☀️';
                let desc = 'Ясно';
                if (weatherCode === 0) { emoji = '☀️'; desc = 'Ясно'; }
                else if (weatherCode === 1 || weatherCode === 2) { emoji = '⛅'; desc = 'Малооблачно'; }
                else if (weatherCode === 3) { emoji = '☁️'; desc = 'Пасмурно'; }
                else if (weatherCode >= 45 && weatherCode <= 48) { emoji = '🌫'; desc = 'Туман'; }
                else if ((weatherCode >= 51 && weatherCode <= 67) || (weatherCode >= 80 && weatherCode <= 82)) { emoji = '🌧'; desc = 'Дождь'; }
                else if ((weatherCode >= 71 && weatherCode <= 77) || (weatherCode >= 85 && weatherCode <= 86)) { emoji = '❄️'; desc = 'Снег'; }
                else if (weatherCode >= 95 && weatherCode <= 99) { emoji = '⛈'; desc = 'Гроза'; }
                
                document.getElementById('weatherIcon').textContent = emoji;
                document.getElementById('temperature').textContent = `${temp}°C`;
                document.getElementById('cityName').textContent = cityName;
                document.getElementById('description').textContent = desc;
                document.getElementById('feelsLike').textContent = `${feelsLike}°C`;
                document.getElementById('humidity').textContent = `${humidity}%`;
                document.getElementById('wind').textContent = `${windSpeed} м/с`;
                document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('pressure').textContent = `${pressure} мм`;
                document.getElementById('visibility').textContent = `${visibility} км`;
                document.getElementById('sunrise').textContent = sunrise;
                document.getElementById('sunset').textContent = sunset;
                document.getElementById('clouds').textContent = `${clouds}%`;
                document.getElementById('windGust').textContent = `${Math.round(windSpeed + 2)} м/с`;
                
                let tip = '';
                if (desc === 'Дождь') tip = '☔ Возьмите зонт!';
                else if (desc === 'Снег') tip = '❄️ Одевайтесь теплее!';
                else if (temp > 25) tip = '😎 Отличная погода для прогулки!';
                else if (temp < 0) tip = '🧣 На улице холодно!';
                else tip = '🌿 Хорошего дня!';
                document.getElementById('weatherTip').textContent = tip;
                
                currentWeather = { temp, desc, cityName };
                showLoading(false);
                
            } catch (error) {
                console.error(error);
                showError('Ошибка загрузки. Проверьте интернет.');
                showLoading(false);
            }
        }
        
        function getLocationWeather() {
            if (!navigator.geolocation) {
                showError('Геолокация не поддерживается');
                return;
            }
            
            showLoading(true);
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                try {
                    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m&timezone=auto`;
                    const response = await fetch(weatherUrl);
                    const data = await response.json();
                    
                    const temp = Math.round(data.current_weather.temperature);
                    document.getElementById('temperature').textContent = `${temp}°C`;
                    document.getElementById('cityName').textContent = 'Ваше местоположение';
                    document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    showLoading(false);
                } catch (error) {
                    showError('Не удалось получить погоду');
                    showLoading(false);
                }
            }, () => {
                showError('Доступ к геолокации запрещён');
                showLoading(false);
            });
        }
        
        function showError(msg) {
            const errDiv = document.getElementById('error');
            errDiv.textContent = `❌ ${msg}`;
            errDiv.classList.add('show');
            setTimeout(() => errDiv.classList.remove('show'), 3000);
        }
        
        function hideError() {
            document.getElementById('error').classList.remove('show');
        }
        
        function showLoading(show) {
            if (show) {
                document.getElementById('loading').classList.add('show');
            } else {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        function switchTab(tab) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('tab-current').classList.remove('active');
            document.getElementById('tab-details').classList.remove('active');
            
            if (tab === 'current') {
                document.getElementById('tab-current').classList.add('active');
            } else {
                document.getElementById('tab-details').classList.add('active');
            }
        }
        
        const popularCities = ['Moscow', 'Saint Petersburg', 'London', 'Paris', 'Berlin', 'Tokyo', 'New York', 'Beijing', 'Dubai', 'Rome'];
        
        const cityInput = document.getElementById('cityInput');
        const suggestionsBox = document.getElementById('suggestions');
        
        cityInput.addEventListener('input', function() {
            const value = this.value.toLowerCase();
            if (value.length < 1) {
                suggestionsBox.classList.remove('show');
                return;
            }
            const filtered = popularCities.filter(city => city.toLowerCase().startsWith(value));
            if (filtered.length > 0) {
                suggestionsBox.innerHTML = filtered.map(city => `<div class="suggestion-item" onclick="selectCity('${city}')">${city}</div>`).join('');
                suggestionsBox.classList.add('show');
            } else {
                suggestionsBox.classList.remove('show');
            }
        });
        
        function selectCity(city) {
            cityInput.value = city;
            suggestionsBox.classList.remove('show');
            getWeather();
        }
        
        document.addEventListener('click', function(e) {
            if (!cityInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.classList.remove('show');
            }
        });
        
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });
        
        cityInput.value = 'Moscow';
        getWeather();
    </script>
</body>
</html>

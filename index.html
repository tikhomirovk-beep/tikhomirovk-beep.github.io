<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            background: #f0f0f0;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: #f0f0f0;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .tab-content {
            display: none;
            padding: 25px;
        }
        .tab-content.active { display: block; }
        .search-section { padding: 25px 25px 0 25px; }
        .search-box {
            position: relative;
            margin-bottom: 10px;
        }
        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
        }
        .search-box input:focus { border-color: #667eea; }
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }
        .suggestions.show { display: block; }
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestion-item:hover { background: #f0f0f0; }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
        }
        .location-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .weather-icon { text-align: center; font-size: 64px; margin: 10px 0; }
        .temperature { text-align: center; font-size: 64px; font-weight: bold; color: #667eea; }
        .city-name { text-align: center; font-size: 24px; font-weight: bold; color: #333; margin: 10px 0; }
        .description { text-align: center; color: #666; margin-bottom: 20px; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
        }
        .info-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 18px; font-weight: bold; color: #333; }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.5s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            display: none;
            margin: 15px 25px;
        }
        .error.show { display: block; }
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('current')">🌤 Сейчас</button>
            <button class="tab-btn" onclick="switchTab('details')">📊 Детали</button>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="🔍 Введите город..." autocomplete="off">
                <div class="suggestions" id="suggestions"></div>
            </div>
            <div class="button-group">
                <button onclick="getWeather()">🌍 Найти</button>
                <button class="location-btn" onclick="getLocationWeather()">📍 Моё местоположение</button>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Загрузка...</p>
        </div>
        
        <div id="error" class="error">❌ Ошибка</div>
        
        <!-- Вкладка 1: Текущая погода -->
        <div id="tab-current" class="tab-content active">
            <div>
                <div class="weather-icon" id="weatherIcon">🌍</div>
                <div class="temperature" id="temperature">--°C</div>
                <div class="city-name" id="cityName">--</div>
                <div class="description" id="description">---</div>
                <div class="info-grid">
                    <div class="info-card"><div class="info-label">🤔 Ощущается как</div><div class="info-value" id="feelsLike">--°C</div></div>
                    <div class="info-card"><div class="info-label">💧 Влажность</div><div class="info-value" id="humidity">--%</div></div>
                    <div class="info-card"><div class="info-label">💨 Ветер</div><div class="info-value" id="wind">-- м/с</div></div>
                    <div class="info-card"><div class="info-label">🕐 Обновлено</div><div class="info-value" id="updateTime">--:--</div></div>
                </div>
            </div>
        </div>
        
        <!-- Вкладка 2: Детали -->
        <div id="tab-details" class="tab-content">
            <div class="info-grid">
                <div class="info-card"><div class="info-label">🌡 Давление</div><div class="info-value" id="pressure">-- мм</div></div>
                <div class="info-card"><div class="info-label">👁 Видимость</div><div class="info-value" id="visibility">-- км</div></div>
                <div class="info-card"><div class="info-label">🌅 Восход</div><div class="info-value" id="sunrise">--:--</div></div>
                <div class="info-card"><div class="info-label">🌇 Закат</div><div class="info-value" id="sunset">--:--</div></div>
                <div class="info-card"><div class="info-label">☁️ Облачность</div><div class="info-value" id="clouds">--%</div></div>
                <div class="info-card"><div class="info-label">💨 Порывы</div><div class="info-value" id="windGust">-- м/с</div></div>
            </div>
            <div style="margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 15px;">
                <div style="font-weight: bold; margin-bottom: 10px;">💡 Совет</div>
                <div id="weatherTip">Выберите город</div>
            </div>
        </div>
        
        <div class="footer">⚡ Погода | OpenWeatherMap</div>
    </div>

    <script>
        // ===== КЛЮЧ API =====
        const API_KEY = "a6c1772a166b4bbdf7a2e07c753da7c5";
        
        // ===== КЭШИРОВАНИЕ (10 минут) =====
        const CACHE_TIME = 10 * 60 * 1000;
        
        function getCachedWeather(city) {
            const cached = localStorage.getItem(`weather_${city.toLowerCase()}`);
            if (cached) {
                const data = JSON.parse(cached);
                if (Date.now() - data.timestamp < CACHE_TIME) {
                    return data.weather;
                }
            }
            return null;
        }
        
        function saveToCache(city, weather) {
            localStorage.setItem(`weather_${city.toLowerCase()}`, JSON.stringify({
                weather: weather,
                timestamp: Date.now()
            }));
            localStorage.setItem('last_city', city);
        }
        
        // ===== ПОЛУЧЕНИЕ ПОГОДЫ =====
        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Введите город');
                return;
            }
            
            // Проверяем кэш
            const cached = getCachedWeather(city);
            if (cached) {
                displayWeather(cached);
                return;
            }
            
            showLoading(true);
            
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=ru`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.cod === 200) {
                    saveToCache(city, data);
                    displayWeather(data);
                } else {
                    showError(data.message || 'Город не найден');
                }
            } catch (error) {
                showError('Ошибка подключения');
            }
            
            showLoading(false);
        }
        
        // ===== ГЕОЛОКАЦИЯ =====
        function getLocationWeather() {
            if (!navigator.geolocation) {
                showError('Геолокация не поддерживается');
                return;
            }
            
            showLoading(true);
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                try {
                    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ru`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.cod === 200) {
                        displayWeather(data);
                        document.getElementById('cityInput').value = data.name;
                    } else {
                        showError('Не удалось получить погоду');
                    }
                } catch (error) {
                    showError('Ошибка подключения');
                }
                
                showLoading(false);
            }, () => {
                showError('Доступ к геолокации запрещён');
                showLoading(false);
            });
        }
        
        // ===== ОТОБРАЖЕНИЕ ПОГОДЫ =====
        function displayWeather(data) {
            // Основные данные
            const temp = Math.round(data.main.temp);
            const feelsLike = Math.round(data.main.feels_like);
            const humidity = data.main.humidity;
            const windSpeed = data.wind.speed;
            const pressure = Math.round(data.main.pressure * 0.750062);
            const visibility = Math.round(data.visibility / 1000);
            const clouds = data.clouds.all;
            const description = data.weather[0].description;
            const cityName = `${data.name}, ${data.sys.country}`;
            
            // Время восхода и заката
            const sunrise = new Date(data.sys.sunrise * 1000).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            const sunset = new Date(data.sys.sunset * 1000).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            // Эмодзи погоды
            let emoji = '☀️';
            const descLower = description.toLowerCase();
            if (descLower.includes('дождь')) emoji = '🌧';
            else if (descLower.includes('снег')) emoji = '❄️';
            else if (descLower.includes('облач')) emoji = '☁️';
            else if (descLower.includes('гроза')) emoji = '⛈';
            else if (descLower.includes('туман')) emoji = '🌫';
            
            // Заполняем вкладку "Сейчас"
            document.getElementById('weatherIcon').textContent = emoji;
            document.getElementById('temperature').textContent = `${temp}°C`;
            document.getElementById('cityName').textContent = cityName;
            document.getElementById('description').textContent = description.charAt(0).toUpperCase() + description.slice(1);
            document.getElementById('feelsLike').textContent = `${feelsLike}°C`;
            document.getElementById('humidity').textContent = `${humidity}%`;
            document.getElementById('wind').textContent = `${windSpeed} м/с`;
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            // Заполняем вкладку "Детали"
            document.getElementById('pressure').textContent = `${pressure} мм`;
            document.getElementById('visibility').textContent = `${visibility} км`;
            document.getElementById('sunrise').textContent = sunrise;
            document.getElementById('sunset').textContent = sunset;
            document.getElementById('clouds').textContent = `${clouds}%`;
            document.getElementById('windGust').textContent = `${Math.round(windSpeed + 2)} м/с`;
            
            // Совет
            let tip = '';
            if (descLower.includes('дождь')) tip = '☔ Возьмите зонт!';
            else if (descLower.includes('снег')) tip = '❄️ Одевайтесь теплее!';
            else if (temp > 25) tip = '😎 Отличная погода для прогулки!';
            else if (temp < 0) tip = '🧣 На улице холодно!';
            else tip = '🌿 Хорошего дня!';
            document.getElementById('weatherTip').textContent = tip;
        }
        
        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showError(msg) {
            const errDiv = document.getElementById('error');
            errDiv.textContent = `❌ ${msg}`;
            errDiv.classList.add('show');
            setTimeout(() => errDiv.classList.remove('show'), 3000);
        }
        
        function showLoading(show) {
            if (show) {
                document.getElementById('loading').classList.add('show');
            } else {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        function switchTab(tab) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('tab-current').classList.remove('active');
            document.getElementById('tab-details').classList.remove('active');
            
            if (tab === 'current') {
                document.getElementById('tab-current').classList.add('active');
            } else {
                document.getElementById('tab-details').classList.add('active');
            }
        }
        
        // ===== ПОДСКАЗКИ ПРИ ВВОДЕ =====
        const popularCities = ['Moscow', 'Saint Petersburg', 'London', 'Paris', 'Berlin', 'Tokyo', 'New York', 'Beijing', 'Dubai', 'Rome', 'Istanbul', 'Madrid'];
        
        const cityInput = document.getElementById('cityInput');
        const suggestionsBox = document.getElementById('suggestions');
        
        cityInput.addEventListener('input', function() {
            const value = this.value.toLowerCase();
            if (value.length < 1) {
                suggestionsBox.classList.remove('show');
                return;
            }
            const filtered = popularCities.filter(city => city.toLowerCase().startsWith(value));
            if (filtered.length > 0) {
                suggestionsBox.innerHTML = filtered.map(city => `<div class="suggestion-item" onclick="selectCity('${city}')">${city}</div>`).join('');
                suggestionsBox.classList.add('show');
            } else {
                suggestionsBox.classList.remove('show');
            }
        });
        
        function selectCity(city) {
            cityInput.value = city;
            suggestionsBox.classList.remove('show');
            getWeather();
        }
        
        document.addEventListener('click', function(e) {
            if (!cityInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.classList.remove('show');
            }
        });
        
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });
        
        // ===== ЗАГРУЗКА ПРИ СТАРТЕ =====
        const lastCity = localStorage.getItem('last_city');
        if (lastCity) {
            const cached = getCachedWeather(lastCity);
            if (cached) {
                cityInput.value = lastCity;
                displayWeather(cached);
            } else {
                cityInput.value = 'Moscow';
                getWeather();
            }
        } else {
            cityInput.value = 'Moscow';
            getWeather();
        }
    </script>
</body>
</html>
